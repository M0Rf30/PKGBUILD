# LocalAI Configuration File
# Variable reference: `local-ai run --help` (env names track LocalAI v4.4.0)

# Logging
# Valid values: [error,warn,info,debug,trace]
LOCALAI_LOG_LEVEL="info"
# Valid values: [default,text,json]
# LOCALAI_LOG_FORMAT="default"

# Storage Configuration
LOCALAI_CONFIG_DIR="/var/lib/local-ai/configuration"
# LOCALAI_CONFIG_DIR_POLL_INTERVAL="1m"
LOCALAI_DATA_PATH="/var/lib/local-ai/data"
GENERATED_CONTENT_PATH="/var/lib/local-ai/generated"
MODELS_PATH="/var/lib/local-ai/models"
# LOCALAI_MODELS_CONFIG_FILE="config.yaml"
UPLOAD_PATH="/run/local-ai/upload"

# Backend Configuration
BACKENDS_PATH="/var/lib/local-ai/backends"
BACKEND_SYSTEM_PATH="/usr/share/local-ai/backends"
# AUTOLOAD_BACKEND_GALLERIES=true
# BACKEND_GALLERIES='[{"name":"localai", "url":"github:mudler/LocalAI/backend/index.yaml@master"}]'
# EXTERNAL_BACKENDS="[]"
# EXTERNAL_GRPC_BACKENDS="[]"
# MAX_ACTIVE_BACKENDS=0
# PRELOAD_BACKEND_ONLY=false
# SINGLE_ACTIVE_BACKEND=false

# Watchdog Configuration
# WATCHDOG_BUSY=false
# WATCHDOG_BUSY_TIMEOUT="5m"
# WATCHDOG_IDLE=false
# WATCHDOG_IDLE_TIMEOUT="15m"

# Model Configuration
# AUTOLOAD_GALLERIES=true
# GALLERIES='[{"name":"localai", "url":"github:mudler/LocalAI/gallery/index.yaml@master"}]'
# LOAD_TO_MEMORY="[]"
# MODELS="[]"
# PRELOAD_MODELS="[]"
# PRELOAD_MODELS_CONFIG=""

# Performance Configuration
# CONTEXT_SIZE=512
# F16=false
# THREADS=4

# API Server Configuration
# Bind address. Defaults to loopback: LocalAI refuses to start on a public or
# wildcard (":8080") interface unless auth or a static API key is configured.
# To expose it, bind a LAN/VPN IP (e.g. "10.0.0.5:8080") or set API_KEY/LOCALAI_AUTH.
ADDRESS="127.0.0.1:8080"
# API_KEY="[]"
# CORS=true
# CORS_ALLOW_ORIGINS=""
# LOCALAI_DISABLE_CSRF=false
# DISABLE_GALLERY_ENDPOINT=false
# DISABLE_METRICS_ENDPOINT=false
# DISABLE_WEBUI=false
# MACHINE_TAG=""
# UPLOAD_LIMIT=15

# Security/Hardening Configuration
# LOCALAI_DISABLE_API_KEY_REQUIREMENT_FOR_HTTP_GET=false
# LOCALAI_DISABLE_PREDOWNLOAD_SCAN=false
# LOCALAI_HTTP_GET_EXEMPTED_ENDPOINTS="^/$,^/app(/.*)?$,^/browse(/.*)?$,^/login/?$,^/explorer/?$,^/assets/.*$,^/static/.*$,^/swagger.*$"
# LOCALAI_OPAQUE_ERRORS=false
# LOCALAI_SUBTLE_KEY_COMPARISON=false

# P2P Configuration
# P2P=false
# P2P_DHT_INTERVAL=360
# P2P_NETWORK_ID=""
# P2P_OTP_INTERVAL=9000
# P2P_TOKEN=""

# Federated Configuration
# FEDERATED=false
